<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI赚钱实验室后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .logo {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .tagline {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .register-form {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .password-strength {
            margin-top: 5px;
            font-size: 0.85em;
        }
        
        .strength-weak {
            color: #dc3545;
        }
        
        .strength-medium {
            color: #ffc107;
        }
        
        .strength-strong {
            color: #28a745;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }
        
        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .terms {
            font-size: 0.9em;
            color: #666;
            margin-top: 20px;
        }
        
        .terms a {
            color: #667eea;
        }
        
        @media (max-width: 480px) {
            .register-container {
                border-radius: 10px;
            }
            
            .register-header {
                padding: 30px 20px;
            }
            
            .register-form {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">🤖 AI赚钱实验室</div>
            <div class="tagline">创建你的后台账户</div>
        </div>
        
        <div class="register-form">
            <div id="alertMessage" class="alert"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名（3-20个字符）" required>
                    <small class="text-muted">用户名将用于登录和显示</small>
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" class="form-control" placeholder="请输入邮箱地址" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码（至少6位）" required>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="请再次输入密码" required>
                </div>
                
                <button type="submit" class="btn">注册账户</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">已有账户？去登录</button>
            </form>
            
            <div class="terms">
                注册即表示你同意我们的 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
            </div>
            
            <div class="form-footer">
                <a href="index.html">← 返回首页</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const alertMessage = document.getElementById('alertMessage');
            const passwordInput = document.getElementById('password');
            const passwordStrength = document.getElementById('passwordStrength');
            
            // 密码强度检查
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = 'weak';
                let message = '密码强度：弱';
                
                if (password.length >= 8) {
                    strength = 'medium';
                    message = '密码强度：中等';
                    
                    if (/[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
                        strength = 'strong';
                        message = '密码强度：强';
                    }
                }
                
                passwordStrength.textContent = message;
                passwordStrength.className = 'password-strength strength-' + strength;
            });
            
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const confirmPassword = document.getElementById('confirmPassword').value.trim();
                
                // 验证输入
                if (!username || !email || !password || !confirmPassword) {
                    showAlert('请填写所有字段', 'error');
                    return;
                }
                
                if (username.length < 3 || username.length > 20) {
                    showAlert('用户名长度应为3-20个字符', 'error');
                    return;
                }
                
                if (!isValidEmail(email)) {
                    showAlert('请输入有效的邮箱地址', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showAlert('密码长度至少为6位', 'error');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showAlert('两次输入的密码不一致', 'error');
                    return;
                }
                
                // 检查用户名是否已存在
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                if (users.some(user => user.username === username)) {
                    showAlert('用户名已存在，请选择其他用户名', 'error');
                    return;
                }
                
                // 保存用户
                const newUser = {
                    username: username,
                    email: email,
                    password: password,
                    createdAt: new Date().toISOString(),
                    lastLogin: null
                };
                
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                // 自动登录
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                localStorage.setItem('loginTime', new Date().toISOString());
                
                showAlert('注册成功！正在跳转到后台...', 'success');
                
                // 跳转到后台
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            });
            
            function isValidEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
            
            function showAlert(message, type) {
                alertMessage.textContent = message;
                alertMessage.className = 'alert alert-' + type;
                alertMessage.style.display = 'block';
                
                // 3秒后隐藏
                setTimeout(() => {
                    alertMessage.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
