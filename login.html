<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI赚钱实验室后台</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
        }
        
        .logo { font-size: 3em; margin-bottom: 15px; }
        .title { font-size: 1.8em; font-weight: 600; margin-bottom: 8px; }
        .subtitle { opacity: 0.9; font-size: 1em; }
        
        .login-form { padding: 40px; }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--dark); font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.3); }
        
        .form-footer { text-align: center; margin-top: 30px; padding-top: 25px; border-top: 1px solid #e5e7eb; }
        .form-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .form-footer a:hover { text-decoration: underline; }
        
        .alert { padding: 14px 18px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        
        .remember-me { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .remember-me input { width: auto !important; }
        
        .security-note {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 25px;
            font-size: 0.85em;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🤖</div>
            <div class="title">AI赚钱实验室</div>
            <div class="subtitle">后台管理系统</div>
        </div>
        
        <div class="login-form">
            <div id="alertMessage" class="alert"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin-bottom: 0; font-weight: normal;">30天内免登录</label>
                </div>
                
                <button type="submit" class="btn-submit">登 录</button>
            </form>
            
            <div class="security-note">
                🔒 安全提示：此系统使用本地存储，请妥善保管账户信息
            </div>
            
            <div class="form-footer">
                还没有账号？ <a href="register.html">立即注册</a><br><br>
                <a href="index.html">← 返回首页</a>
            </div>
        </div>
    </div>
    
    <script>
        // 安全改进：防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 安全改进：限流保护
        let loginAttempts = 0;
        const maxAttempts = 5;
        let lockoutTime = 0;
        
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'dashboard.html';
                return;
            }
            
            // 检查是否被锁定
            const savedLockout = localStorage.getItem('loginLockout');
            if (savedLockout && Date.now() < parseInt(savedLockout)) {
                showAlert('登录尝试过多，请稍后再试', 'error');
                document.getElementById('loginForm').querySelector('button').disabled = true;
                return;
            }
            
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 检查锁定状态
                if (lockoutTime > Date.now()) {
                    showAlert('登录尝试过多，请稍后再试', 'error');
                    return;
                }
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const remember = document.getElementById('remember').checked;
                
                // 输入验证
                if (!username || !password) {
                    showAlert('请输入用户名和密码', 'error');
                    return;
                }
                
                // 简单的验证
                if (username === 'admin' && password === 'admin123') {
                    // 安全改进：设置安全存储
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', escapeHtml(username));
                    localStorage.setItem('loginTime', Date.now());
                    
                    // 记住我功能
                    if (remember) {
                        localStorage.setItem('rememberMe', 'true');
                    }
                    
                    loginAttempts = 0;
                    showAlert('登录成功！正在跳转到后台...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    // 记录失败尝试
                    loginAttempts++;
                    
                    if (loginAttempts >= maxAttempts) {
                        lockoutTime = Date.now() + 5 * 60 * 1000; // 锁定5分钟
                        localStorage.setItem('loginLockout', lockoutTime);
                        showAlert('登录尝试过多，已锁定5分钟', 'error');
                    } else {
                        showAlert(`用户名或密码错误，还剩${maxAttempts - loginAttempts}次尝试机会`, 'error');
                    }
                }
            });
            
            function showAlert(message, type) {
                const alert = document.getElementById('alertMessage');
                alert.textContent = message;
                alert.className = 'alert alert-' + type;
                alert.style.display = 'block';
                
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 4000);
            }
        });
        
        // 安全改进：清除敏感数据
        window.onerror = function() {
            return true;
        };
    </script>
</body>
</html>
